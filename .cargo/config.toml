# Tune the x86 SIMD kernels for the CPU you build on: `target-cpu=native` detects the build
# host's features, so it uses AVX2 + FMA when present (e.g. the i5-6500T target) and quietly
# falls back to whatever the machine supports otherwise. The default x86_64 baseline is
# SSE2-only, where `wide`'s f32x8 compiles to two 128-bit ops — half the width. Scoped to
# x86_64 so the arm64/NEON build (already 128-bit, no AVX) is untouched.
#
# `native` bakes in the build host's ISA, so the binary may fault on an older CPU. To build a
# portable binary, override via RUSTFLAGS (it takes precedence over this file) — see README:
#   RUSTFLAGS="-C target-cpu=x86-64-v3" ...  # AVX2 baseline (Haswell, 2013+)
#   RUSTFLAGS="-C target-cpu=x86-64"    ...  # universal SSE2 baseline
[target.'cfg(target_arch = "x86_64")']
rustflags = ["-C", "target-cpu=native"]
