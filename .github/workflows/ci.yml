name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      # Check that the dev config builds
      - name: Build (dev)
        run: cargo build --verbose

      # Build and test with x86-64-v2 config
      - name: Build (release, x86-64-v2)
        run: cargo build --release --verbose
        env:
          RUSTFLAGS: "-C target-cpu=x86-64-v2"
      - name: Fast unit tests (x86-64-v2)
        run: cargo test --release --verbose
        env:
          RUSTFLAGS: "-C target-cpu=x86-64-v2"

      # Check that the native config builds (likely x86-64-v3)
      - name: Build (release)
        run: cargo build --release --verbose
      - name: Fast unit tests
        run: cargo test --verbose

      # The ~5.2 GB Q4_K_M GGUF is downloaded from Hugging Face (public, no auth) and cached
      # across runs under a key tied to its filename, so it survives code changes and only
      # re-downloads on a cache miss/eviction.
      - name: Cache model weights
        uses: actions/cache@v4
        with:
          path: LFM2.5-8B-A1B-Q4_K_M.gguf
          key: gguf-LFM2.5-8B-A1B-Q4_K_M

      - name: Download model weights if not cached
        run: |
          test -f LFM2.5-8B-A1B-Q4_K_M.gguf || \
          curl -fL -o LFM2.5-8B-A1B-Q4_K_M.gguf \
            "https://huggingface.co/LiquidAI/LFM2.5-8B-A1B-GGUF/resolve/main/LFM2.5-8B-A1B-Q4_K_M.gguf"

      # End-to-end tests are `#[ignore]`d so the plain `cargo test` above stays model-free;
      # `--ignored` (no `--test` filter) runs every ignored test across all binaries, so
      # future e2e tests are picked up automatically once marked `#[ignore]`.
      - name: Run end-to-end model tests
        run: cargo test --release -- --ignored

      # Benchmark + correctness smoke test via the CLI binary: greedily generates 64 tokens
      # and asserts the reply mentions Paris (robust across builds/arches; no exact-id gate).
      - name: Generation benchmark
        run: ./benchmark.sh
