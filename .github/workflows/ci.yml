name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      # On x86_64 runners the aarch64 inline-asm matvec kernel is cfg'd out, so the portable
      # `wide` SIMD fallback is what gets built and tested here. `.cargo/config.toml` pins
      # target-cpu=native, which resolves to the runner's own CPU (binaries run on that same
      # host, so the baked-in ISA is always valid).
      - name: Build (dev)
        run: cargo build --verbose

      - name: Build (release)
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --verbose
